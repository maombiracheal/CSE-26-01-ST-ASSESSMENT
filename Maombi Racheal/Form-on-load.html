<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beneficiary Registration</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="Javascript/form.js" defer></script>
</head>
<body>
    <main class="layout">
        <section class="panel panel--left">
            <div class="brand">
                <div class="logo" aria-label="FCA logo">
                <img class="logo__img" src="/images/fca-logo-Photoroom.png" alt="FCA logo">
                
               
            </div>
                <h1>Refugee Support Program</h1>
            </div>
        </section>

        <section class="panel panel--right">
            <div class="card">
                <div id="successAlert" class="alert-success" style="display: none;">
                    <span>Beneficiary registered successfully</span>
                    <button type="button" id="closeAlert">&times;</button>
                </div>

                <h2 class="card__title">BENEFICIARY REGISTRATION FORM</h2>
                
                <form class="form" id="beneficiaryForm" novalidate>
                    <div class="form__grid">
                        <div class="form__group">
                            <label class="form__label" for="firstName">First Name <span>*</span></label>
                            <input class="form__input" id="firstName" name="firstName" type="text" placeholder="Enter your First name" required>
                            <span class="error-message" style="display: none;"></span>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="lastName">Last Name <span>*</span></label>
                            <input class="form__input" id="lastName" name="lastName" type="text" placeholder="Enter your Last name" required>
                            <span class="error-message" style="display: none;"></span>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="dob">Date of birth <span>*</span></label>
                            <input class="form__input" id="dob" name="dob" type="text" placeholder="YYYY / MM / DD" required>
                            <span class="error-message" style="display: none;"></span>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="placeOfBirth">Place of Birth <span>*</span></label>
                            <input class="form__input" id="placeOfBirth" name="placeOfBirth" type="text" placeholder="Enter your place of residence" required>
                            <span class="error-message" style="display: none;"></span>
                        </div>

                        <div class="form__group" style="grid-column: 1 / -1;">
                            <label class="form__label">Gender</label>
                            <div class="form__radio-group">
                                <label class="form__radio">
                                    <input type="radio" name="gender" value="male"> Male
                                </label>
                                <label class="form__radio">
                                    <input type="radio" name="gender" value="female" checked> Female
                                </label>
                            </div>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="nationality">Nationality <span>*</span></label>
                            <select class="form__select" id="nationality" name="nationality" required>
                                <option value="">-- Select Nationality --</option>
                                <option value="Ugandan">Ugandan</option>
                                <option value="Kenyan">Kenyan</option>
                                <option value="Tanzanian">Tanzanian</option>
                                <option value="Burundian">Burundian</option>
                                <option value="Rwandese">Rwandese</option>
                                <option value="Somali">Somali</option>
                                <option value="South Sudanese">South Sudanese</option>
                            </select>
                            <span class="error-message" style="display: none;"></span>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="maritalStatus">Marital status <span>*</span></label>
                            <select class="form__select" id="maritalStatus" name="maritalStatus" required>
                                <option value="">-- Select Marital status --</option>
                                <option value="Single">Single</option>
                                <option value="Married">Married</option>
                                <option value="Divorced">Divorced</option>
                                <option value="Widowed">Widowed</option>
                                <option value="Separated">Separated</option>
                            </select>
                            <span class="error-message" style="display: none;"></span>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="settlementCamp">Settlement camp <span>*</span></label>
                            <select class="form__select" id="settlementCamp" name="settlementCamp" required>
                                <option value="">-- Select settlement camp --</option>
                                <option value="Gulu settlement camp">Gulu settlement camp</option>
                                <option value="Arua settlement camp">Arua settlement camp</option>
                                <option value="Mbarara settlement camp">Mbarara settlement camp</option>
                                <option value="Kasese settlement camp">Kasese settlement camp</option>
                                <option value="Busia settlement camp">Busia settlement camp</option>
                                <option value="Mbale settlement camp">Mbale settlement camp</option>
                                <option value="Kigezi settlement camp">Kigezi settlement camp</option>
                            </select>
                            <span class="error-message" style="display: none;"></span>
                        </div>

                        <div class="form__group">
                            <label class="form__label" for="joiningDate">Date of joining Settlement camp <span>*</span></label>
                            <input class="form__input" id="joiningDate" name="joiningDate" type="text" placeholder="YYYY / MM / DD" required>
                            <span class="error-message" style="display: none;"></span>
                        </div>
                    </div>

                    <button type="submit" class="btn">Register</button>
                </form>
            </div>
        </section>
    </main>
    <script src="controller/validation.js"></script>
</body>
</html>
